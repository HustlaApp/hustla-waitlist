<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hustla</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* YOUR ENTIRE CSS REMAINS EXACTLY THE SAME */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;line-height:1.6;color:#1a1a1a;background:#ffffff;}
.container{max-width:1200px;margin:0 auto;padding:0 20px;}
.hero{min-height:100vh;display:flex;align-items:center;background:#ffffff;color:#1a1a1a;padding:80px 0 60px;border-bottom:1px solid #e0e0e0;}
.hero-content{text-align:center;}
.logo{font-size:64px;font-weight:700;letter-spacing:-2px;margin-bottom:15px;text-transform:lowercase;color:#000000;}
.coming-soon{font-size:14px;font-weight:500;color:#666666;margin-bottom:40px;text-transform:uppercase;letter-spacing:1px;}
.tagline{font-size:22px;font-weight:400;margin-bottom:50px;color:#333333;max-width:500px;margin-left:auto;margin-right:auto;}
.waitlist-section{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:30px;margin-top:40px;}
.waitlist-card{background:white;border-radius:12px;padding:40px 30px;box-shadow:0 2px 8px rgba(0,0,0,0.08);border:1px solid #e0e0e0;transition:transform 0.3s ease,box-shadow 0.3s ease;}
.waitlist-card:hover{transform:translateY(-3px);box-shadow:0 4px 16px rgba(0,0,0,0.12);}
.card-title{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:12px;}
.card-description{font-size:15px;color:#666;margin-bottom:30px;line-height:1.6;}
#benefitsSection{margin:20px 0;opacity:0;max-height:0;overflow:hidden;transition:all 0.4s ease;}
#benefitsSection.show{opacity:1;max-height:300px;}
.benefits{list-style:none;margin:0;padding:18px 20px;background:#fafafa;border:1px solid #e5e5e5;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.benefits li{padding:11px 0;color:#1a1a1a;font-size:15px;position:relative;padding-left:32px;display:block;font-weight:400;line-height:1.5;text-align:left;}
.benefits li:before{content:"";position:absolute;left:0;top:11px;width:20px;height:20px;background:#000000;border-radius:50%;}
.benefits li:after{content:"✓";position:absolute;left:6px;top:11px;color:white;font-weight:700;font-size:13px;line-height:20px;}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:14px;font-weight:600;color:#333;margin-bottom:8px;text-align:left;}
.form-input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px;transition:border-color 0.3s ease;font-family:inherit;background:#ffffff;}
.form-input:focus{outline:none;border-color:#000000;}
select.form-input{cursor:pointer;}
.submit-btn{width:100%;padding:16px;background:#000000;color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:background 0.2s ease;}
.submit-btn:hover{background:#333333;}
.footer{background:#f5f5f5;color:#1a1a1a;padding:40px 0;text-align:center;}
.footer-text{font-size:14px;opacity:0.7;margin-bottom:10px;}
.footer-email{color:#000000;text-decoration:none;font-weight:500;}
.footer-email:hover{text-decoration:underline;}
</style>
</head>

<body>

<section class="hero">
<div class="container">
<div class="hero-content">

<h1 class="logo">hustla.</h1>
<p class="coming-soon">Coming Soon</p>
<p class="tagline">Find skilled workers near you. Get customers for your work.</p>

<div class="waitlist-section">
<div class="waitlist-card" style="max-width: 500px; margin: 0 auto;">
<h2 class="card-title">Join the Waitlist</h2>

<!-- ✅ NETLIFY FORM START -->
<form 
  class="waitlist-form"
  name="waitlist"
  method="POST"
  data-netlify="true"
>

<input type="hidden" name="form-name" value="waitlist">

<div class="form-group">
<label class="form-label" for="userType">I am a</label>
<select id="userType" name="userType" class="form-input" required>
<option value="">Select one</option>
<option value="provider">Service Provider (Barber, Tailor, Carpenter, etc.)</option>
<option value="customer">Customer (Looking for skilled workers)</option>
</select>
</div>

<div id="benefitsSection">
<ul class="benefits" id="benefitsList"></ul>
</div>

<div class="form-group">
<label class="form-label" for="userName">Name</label>
<input type="text" id="userName" name="name" class="form-input" placeholder="John Doe" required>
</div>

<div class="form-group">
<label class="form-label" for="userEmail">Email</label>
<input type="email" id="userEmail" name="email" class="form-input" placeholder="john@example.com" required>
</div>

<button type="submit" class="submit-btn">Join Waitlist</button>

</form>
<!-- ✅ NETLIFY FORM END -->

</div>
</div>

</div>
</div>
</section>

<footer class="footer">
<div class="container">
<p class="footer-text">
<a href="mailto:hello@hustla.live" class="footer-email">hello@hustla.live</a>
</p>
<p class="footer-text" style="margin-top:15px;">
Launching soon · By Africans, for Africa
</p>
<p class="footer-text" style="margin-top:10px;font-size:13px;">
© 2026 hustla
</p>
</div>
</footer>

<script>
// Benefits animation stays
const benefits = {
provider:[
'Get found by customers',
'Build your portfolio',
'Get paid securely'
],
customer:[
'See verified workers nearby',
'Check ratings and reviews',
'Book and pay in the app'
]
};

document.getElementById('userType').addEventListener('change', function(){
const userType = this.value;
const benefitsSection = document.getElementById('benefitsSection');
const benefitsList = document.getElementById('benefitsList');

if(userType){
benefitsList.innerHTML = benefits[userType]
.map(b => `<li>${b}</li>`).join('');
setTimeout(()=>benefitsSection.classList.add('show'),10);
}else{
benefitsSection.classList.remove('show');
}
});
</script>

</body>
</html>
